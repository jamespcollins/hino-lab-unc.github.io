      description: |
       James is in the Department of City and Regional Planning. His research engages with coastal communities in North Carolina experiencing and responding to flooding. He investigates how social, economic, and housing factors influence vulnerability and resilience, with projects on chronic coastal flooding, H-2A farmworker housing, and the long-term impacts of residential floodplain buyouts. His work aims to inform more equitable and effective strategies for hazard mitigation and climate adaptation.

